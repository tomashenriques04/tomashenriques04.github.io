<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomás Henriques | Portfolio</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #00f5d4;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #121212 100%);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.2);
        }

        h1 { margin: 0; font-size: 3.2rem; letter-spacing: -1.5px; }
        .tagline { color: var(--primary); font-weight: 500; margin-top: 10px; font-size: 1.2rem; }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        section { margin-bottom: 60px; }
        h2 { font-size: 1.6rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        .about-text { font-size: 1.1rem; color: var(--text-dim); text-align: justify; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border-bottom: 2px solid rgba(0, 245, 212, 0.1);
            margin-bottom: 15px;
        }

        .card h3 { font-size: 1.2rem; margin-top: 0; color: var(--text); }
        .card p { margin: 8px 0; color: var(--text-dim); }
        .card ul { padding-left: 20px; margin-bottom: 0; color: var(--text-dim); }

        .swot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .lang-container { margin-bottom: 18px; }
        .lang-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 500; }
        .progress-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; border-radius: 5px; }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover { background: var(--primary); color: #121212; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 10px;
        }
        .modal-content {
            background: white;
            color: black;
            max-width: 850px;
            margin: auto;
            padding: 50px;
            border-radius: 8px;
            position: relative;
        }
        .close-btn { 
            color: #ff4d4d; 
            font-weight: bold; 
            cursor: pointer; 
            float: right; 
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; 
            height: 0;
            max-width: 400px;
            margin: auto;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

            position: absolute;
            top: 0; left: 0; width: 100%; height: 100
